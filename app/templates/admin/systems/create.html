{% extends "admin/base_admin.html" %}
{% block title %}New System{% endblock %}

{% block content %}
<div class="admin-page-header">
  <h1>New System</h1>
  <a href="/admin/systems/" class="btn btn-ghost">← Back</a>
</div>

<form method="POST" action="/admin/systems/create" class="admin-form">
  <div class="form-group">
    <label for="name">System Name <span class="required">*</span></label>
    <input type="text" id="name" name="name" required autofocus
           placeholder="e.g. Dungeons &amp; Dragons 5e"
           class="form-input">
  </div>

  <div class="form-group">
    <label for="abbreviation">Abbreviation</label>
    <input type="text" id="abbreviation" name="abbreviation"
           placeholder="e.g. D&amp;D 5e" maxlength="20"
           class="form-input" style="max-width:200px">
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="3"
              placeholder="Short description for the system card..."
              class="form-input"></textarea>
  </div>

  <div class="form-group">
    <label>Starting Theme</label>
    <div class="preset-grid">
      {% for p in presets %}
      <label class="preset-option">
        <input type="radio" name="theme_preset" value="{{ p }}"
               {% if p == 'low-fantasy' %}checked{% endif %}>
        <span class="preset-label preset-{{ p }}">{{ p | replace('-', ' ') | title }}</span>
      </label>
      {% endfor %}
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Create System →</button>
  </div>
</form>
{% endblock %}
