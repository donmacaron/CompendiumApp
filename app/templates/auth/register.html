{% extends "base.html" %}
{% block title %}Register — Compendium{% endblock %}
{% block content %}
<div style="max-width:400px;margin:80px auto;padding:32px;border:1px solid #c4a96b;background:#f5e9c8;">
  <h2 style="margin-bottom:20px;font-family:serif;">Create Account</h2>
  {% if error %}
    <p style="color:red;margin-bottom:16px;">{{ error }}</p>
  {% endif %}
  <form method="POST" action="/auth/register">
    <div style="margin-bottom:14px;">
      <label style="display:block;margin-bottom:4px;">Username</label>
      <input type="text" name="username" required autofocus
             style="width:100%;padding:8px;border:1px solid #c4a96b;background:#fff8e7;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;margin-bottom:4px;">Email</label>
      <input type="email" name="email" required
             style="width:100%;padding:8px;border:1px solid #c4a96b;background:#fff8e7;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;margin-bottom:4px;">Password</label>
      <input type="password" name="password" required
             style="width:100%;padding:8px;border:1px solid #c4a96b;background:#fff8e7;">
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;margin-bottom:4px;">Confirm Password</label>
      <input type="password" name="confirm_password" required
             style="width:100%;padding:8px;border:1px solid #c4a96b;background:#fff8e7;">
    </div>
    <button type="submit"
            style="width:100%;padding:10px;background:#8b2e2e;color:#fff;border:none;cursor:pointer;font-size:1em;">
      Register
    </button>
  </form>
  <p style="margin-top:16px;text-align:center;">
    Already have an account? <a href="/auth/login">Login</a>
  </p>
</div>
{% endblock %}
